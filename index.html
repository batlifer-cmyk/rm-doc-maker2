<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>라이언멤버스 서류 발급기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   SCREEN STYLES — 입력 폼 UI
═══════════════════════════════════════════════ */
@media screen {
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rm-red: #b91c1c;
    --rm-red-light: #fef2f2;
    --border: #e2e2e2;
    --text: #111;
    --muted: #6b7280;
    --bg: #f3f4f6;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 36px 16px 60px;
  }

  .app-wrap {
    max-width: 720px;
    margin: 0 auto;
  }

  /* 헤더 */
  .app-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .stamp-icon {
    width: 48px; height: 48px;
    border: 2.5px solid var(--rm-red);
    border-radius: 4px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--rm-red);
    font-size: 9.5px; font-weight: 700;
    line-height: 1.4; flex-shrink: 0;
  }
  .app-title { font-size: 20px; font-weight: 700; line-height: 1.2; }
  .app-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* 카드 */
  .card {
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 2px 16px rgba(0,0,0,.07);
    padding: 28px 32px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 11px; font-weight: 700;
    color: var(--rm-red);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 7px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #f0f0f0;
  }

  /* 폼 그리드 */
  .frow { display: grid; gap: 14px; margin-bottom: 14px; }
  .frow.col2 { grid-template-columns: 1fr 1fr; }
  .frow.col3 { grid-template-columns: 1fr 1fr 1fr; }
  .frow.col1 { grid-template-columns: 1fr; }

  .field label {
    display: block;
    font-size: 11.5px; font-weight: 600;
    color: #444;
    margin-bottom: 5px;
  }
  .field label .req { color: var(--rm-red); margin-left: 2px; }
  .field input, .field textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: inherit;
    font-size: 13.5px;
    color: var(--text);
    background: #fafafa;
    outline: none;
    transition: border-color .15s, background .15s;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--rm-red);
    background: #fff;
  }
  .field .hint {
    font-size: 10.5px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* 출석 날짜 */
  .session-ctrl {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .session-ctrl .sc-label { font-size: 12px; color: #444; font-weight: 600; }
  .sc-btn {
    width: 28px; height: 28px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: #fff;
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .1s, color .1s;
    color: #444;
  }
  .sc-btn:hover { border-color: var(--rm-red); color: var(--rm-red); }
  .sc-count { font-size: 15px; font-weight: 700; min-width: 28px; text-align: center; }
  .sc-unit { font-size: 12px; color: var(--muted); }

  /* 수강기간 기간선택 UI */
  .period-row {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .period-row input[type=date] {
    border: 1.5px solid var(--border); border-radius: 8px;
    padding: 8px 8px; font-size: 12px; font-family: inherit;
    outline: none; background: #fafafa;
  }
  .period-row input[type=date]:focus { border-color: var(--rm-red); background:#fff; }

  /* 교육요일 UI */
  .sched-block {
    background: #fafafa; border: 1.5px solid #eee;
    border-radius: 10px; padding: 12px 14px; margin-top: 8px;
  }
  .sched-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
  .sched-row:last-child { margin-bottom:0; }
  .toggle-btn {
    padding: 5px 12px;
    border: 1.5px solid var(--border); border-radius: 16px;
    background: #fff; font-size: 12px; font-weight: 600;
    font-family: inherit; cursor: pointer; color: #555;
    transition: all .15s;
  }
  .toggle-btn.active { background: var(--rm-red); color: #fff; border-color: var(--rm-red); }
  .sched-day-btn {
    width: 30px; height: 30px;
    border: 1.5px solid var(--border); border-radius: 50%;
    background: #fff; font-size: 12px; font-weight: 600;
    font-family: inherit; cursor: pointer; color: #444;
    transition: all .12s;
  }
  .sched-day-btn.active { background: var(--rm-red); color: #fff; border-color: var(--rm-red); }
  .sched-time-sel {
    border: 1.5px solid var(--border); border-radius: 7px;
    padding: 6px 8px; font-size: 12px; font-family: inherit;
    outline: none; background: #fafafa;
  }
  .sched-time-sel:focus { border-color: var(--rm-red); background: #fff; }

  /* 발급일 동기화 버튼 */
  .sync-date-btn {
    width: 100%; padding: 9px;
    border: 1.5px solid var(--rm-red); border-radius: 8px;
    background: #fff; color: var(--rm-red);
    font-size: 12.5px; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: all .15s; margin-top: 6px;
  }
  .sync-date-btn:hover { background: var(--rm-red); color: #fff; }

  .preset-btn {
    padding: 5px 12px;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    background: #fff;
    font-size: 12px; font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    color: #555;
    transition: all .15s;
  }
  .preset-btn:hover, .preset-btn.active {
    background: var(--rm-red); color: #fff; border-color: var(--rm-red);
  }
  .day-btn {
    width: 30px; height: 30px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    background: #fff;
    font-size: 12px; font-weight: 600;
    font-family: inherit;
    cursor: pointer; color: #444;
    transition: all .12s;
  }
  .day-btn.active { background: var(--rm-red); color: #fff; border-color: var(--rm-red); }

  .date-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .date-grid input {
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 7px 4px;
    text-align: center;
    font-size: 12px;
    font-family: inherit;
    background: #fafafa;
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  .date-grid input:focus { border-color: var(--rm-red); background: #fff; }
  .date-grid input::placeholder { color: #ccc; font-size: 10px; }

  /* 액션 버튼들 */
  .action-bar {
    display: flex; gap: 10px;
    margin-top: 6px;
  }
  .btn {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px; font-weight: 700;
    cursor: pointer; border: none;
    transition: opacity .15s, transform .08s;
  }
  .btn:active { transform: scale(.97); }
  .btn-outline {
    background: #fff;
    border: 1.5px solid var(--border);
    color: #444;
  }
  .btn-outline:hover { border-color: #aaa; }
  .btn-red { background: var(--rm-red); color: #fff; }
  .btn-red:hover { opacity: .88; }

  /* 프리뷰 선택 */
  .doc-tabs {
    display: flex; gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .doc-tab {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 12.5px; font-weight: 600;
    cursor: pointer; border: none;
    background: #f0f0f0; color: #555;
    transition: background .15s, color .15s;
  }
  .doc-tab.active { background: var(--rm-red); color: #fff; }

  /* 인쇄 버튼 */
  .print-bar {
    display: flex; gap: 10px;
    margin-top: 20px;
  }
  .btn-print {
    flex: 1; padding: 13px;
    background: var(--rm-red); color: #fff;
    border: none; border-radius: 10px;
    font-family: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer;
  }
  .btn-print:hover { opacity: .88; }
  .btn-print-all {
    flex: 1; padding: 13px;
    background: #111; color: #fff;
    border: none; border-radius: 10px;
    font-family: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer;
  }
  .print-hint {
    font-size: 11.5px; color: var(--muted);
    margin-top: 8px; line-height: 1.6;
  }

  /* 프리뷰 영역 */
  #preview-area {
    background: #e8e8e8;
    border-radius: 10px;
    padding: 20px;
    overflow: auto;
  }
  .preview-doc {
    background: #fff;
    width: 595px;
    min-height: 842px;
    margin: 0 auto;
    box-shadow: 0 4px 24px rgba(0,0,0,.18);
    padding: 0;
    transform-origin: top center;
  }

  /* 스케일 조정 */
  @media (max-width: 680px) {
    .preview-doc { transform: scale(0.52); margin-bottom: -400px; }
  }
}

/* ═══════════════════════════════════════════════
   PRINT STYLES — PDF 출력용
   각 문서는 .doc-page 클래스 사용
═══════════════════════════════════════════════ */
@media print {
  @page {
    size: A4;
    margin: 15mm 20mm;
  }

  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

  body, html {
    margin: 0; padding: 0;
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
  }

  /* 화면 UI 숨기기 */
  .app-header, .card:not(.preview-card), .action-bar,
  .doc-tabs, .print-bar, .print-hint, #preview-area > *:not(.active-print),
  .app-wrap > *:not(#print-target) { display: none !important; }

  #print-target { display: block !important; }

  .doc-page {
    width: 100%;
    page-break-after: always;
    page-break-inside: avoid;
  }
  .doc-page:last-child { page-break-after: avoid; }

  /* 도장 */
  .stamp-box {
    border: 2px solid rgba(185,28,28,0.8) !important;
    color: rgba(185,28,28,0.8) !important;
  }
}

/* ═══════════════════════════════════════════════
   문서 공통 스타일 (화면 + 인쇄 공용)
═══════════════════════════════════════════════ */
.doc-page {
  font-family: 'Noto Sans KR', sans-serif;
  width: 595px;
  min-height: 840px;
  padding: 28px 38px 50px;
  background: #fff;
  position: relative;
  color: #000;
}

/* 외곽 테두리 */
.doc-border {
  position: absolute;
  top: 14px; left: 14px;
  right: 14px; bottom: 14px;
  border: 1.5px solid #000;
  pointer-events: none;
}

.doc-inner {
  padding: 28px 24px;
}

/* 문서 제목 */
.doc-title {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: .25em;
  margin-bottom: 32px;
}
.doc-title.en {
  font-size: 19px;
  letter-spacing: .12em;
}
.doc-title .sub {
  display: block;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: .08em;
  margin-top: 4px;
  color: #444;
}

/* 테이블 공통 */
.doc-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 0;
  font-size: 8.5px;
}
.doc-table td {
  border: 0.5px solid #000;
  padding: 0;
  vertical-align: middle;
}
.doc-table .lbl {
  background: #f8f8f8;
  text-align: center;
  padding: 7px 4px;
  font-weight: 500;
  white-space: nowrap;
  width: 22%;
}
.doc-table .val {
  text-align: center;
  padding: 7px 8px;
  font-size: 8.5px;
}
.doc-table .val.bold { font-weight: 600; }

/* 확인 문구 */
.doc-confirm {
  text-align: center;
  margin-top: 30px;
  font-size: 10px;
}

/* 발급일 */
.doc-date {
  text-align: center;
  margin-top: 22px;
  margin-bottom: 6px;
  font-size: 10px;
}

/* 서명란 */
.doc-sign {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-top: 20px;
  font-size: 10px;
  line-height: 1.4;
}
.doc-sign-text {
  text-align: center;
  white-space: nowrap;
  line-height: 1;   /* 텍스트 자체 line-height 고정 */
  display: inline-block;
}
/* (인) 글자 감싸는 anchor - 도장 기준점 */
.sign-in-anchor {
  position: relative;
  display: inline-block;
  line-height: 1;        /* 글자 높이 = 폰트 크기와 일치 */
  vertical-align: middle;
}
.doc-sign-stamp {
  position: absolute;
  width: 56px;
  height: 56px;
  /* (인) 글자의 정중앙:
     left: 글자 너비의 50% (inline-block이므로 자동)
     top: 글자 높이의 50% (line-height:1이므로 font-size의 50%) */
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  pointer-events: none;
}

/* 도장 */
.stamp-box {
  width: 44px; height: 44px;
  border: 2px solid rgba(185,28,28,.82);
  border-radius: 2px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: rgba(185,28,28,.82);
  font-size: 8px; font-weight: 700;
  line-height: 1.4;
  flex-shrink: 0;
}

.stamp-img {
  width: 56px;
  height: 56px;
  object-fit: contain;
  mix-blend-mode: multiply;
  opacity: 0.85;
}

/* 출석 날짜 테이블 */
.attend-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 7.8px;
}
.attend-table td {
  border: 0.5px solid #000;
  text-align: center;
  padding: 4px 2px;
  width: 25%;
}
.attend-table .att-lbl { background: #f8f8f8; font-weight: 500; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     화면 UI
══════════════════════════════════════════ -->
<div class="app-wrap" id="screen-ui">

  <div class="app-header">
    <div class="stamp-icon"><span>RYAN</span><span>Members</span></div>
    <div>
      <div class="app-title">수강료 환급 서류 발급기</div>
      <div class="app-subtitle">수료증 · 출석확인증 · 교육비 명세서 3종 자동 생성</div>
    </div>
  </div>

  <!-- 기본 정보 -->
  <div class="card">
    <div class="card-title">기본 정보</div>
    <div class="frow col2">
      <div class="field">
        <label>성명 <span class="req">*</span></label>
        <input id="f-name" placeholder="홍길동">
      </div>
      <div class="field">
        <label>생년월일</label>
        <input id="f-birth" placeholder="1985.03.22">
      </div>
    </div>
    <div class="frow col2">
      <div class="field">
        <label>수강 과정명</label>
        <input id="f-course" value="영어회화">
      </div>
      <div class="field">
        <label>수강료 <span class="req">*</span></label>
        <input id="f-tuition" placeholder="1,800,000원">
      </div>
    </div>
  </div>

  <!-- 수강 기간 -->
  <div class="card">
    <div class="card-title">수강 기간 & 일정</div>
    <!-- 수강기간 -->
    <div class="frow col1">
      <div class="field">
        <label>수강 기간 <span class="req">*</span></label>
        <input id="f-period" placeholder="2026년 4월 5일 ~ 2026년 4월 26일">
        <div class="period-row" style="margin-top:8px;">
          <span style="font-size:11px;color:#666;">시작</span>
          <input type="date" id="f-period-start" onchange="syncPeriod()">
          <span style="font-size:11px;color:#666;">~</span>
          <input type="date" id="f-period-end" onchange="syncPeriod()">
          <button class="toggle-btn" onclick="applyPeriodCal()" style="margin-left:2px;">적용</button>
        </div>
      </div>
    </div>

    <!-- 교육요일 및 시간 -->
    <div class="frow col1">
      <div class="field">
        <label>교육요일 및 시간</label>
        <input id="f-schedule" placeholder="매주 일요일 19:00–20:30">
        <div class="sched-block">
          <div class="sched-row">
            <button class="toggle-btn" id="btn-maemae" onclick="toggleMaemae()">매주</button>
            <span style="font-size:11px;color:#666;margin-left:2px;">요일</span>
            <button class="sched-day-btn" onclick="toggleSchedDay(this,'월')">월</button>
            <button class="sched-day-btn" onclick="toggleSchedDay(this,'화')">화</button>
            <button class="sched-day-btn" onclick="toggleSchedDay(this,'수')">수</button>
            <button class="sched-day-btn" onclick="toggleSchedDay(this,'목')">목</button>
            <button class="sched-day-btn" onclick="toggleSchedDay(this,'금')">금</button>
            <button class="sched-day-btn" onclick="toggleSchedDay(this,'토')">토</button>
            <button class="sched-day-btn" onclick="toggleSchedDay(this,'일')">일</button>
          </div>
          <div class="sched-row">
            <span style="font-size:11px;color:#666;">시간</span>
            <select class="sched-time-sel" id="sched-start-t"></select>
            <span style="font-size:11px;color:#666;">~</span>
            <select class="sched-time-sel" id="sched-end-t"></select>
            <button class="toggle-btn" onclick="applySchedule()" style="margin-left:4px;">적용</button>
            <button class="toggle-btn" onclick="applyScheduleToAttendance()" style="margin-left:4px;background:#1d4ed8;color:#fff;border-color:#1d4ed8;">📅 출석날짜에도 적용</button>
          </div>
        </div>
      </div>
    </div>
    <div class="frow col3">
      <div class="field">
        <label>수료율</label>
        <input id="f-completion" value="100%">
      </div>
      <div class="field">
        <label>출석 연도</label>
        <input id="f-year" placeholder="2025">
      </div>
      <div class="field">
        <label>연락처</label>
        <input id="f-contact" value="0507-1423-1123">
      </div>
    </div>
  </div>

  <!-- 출석 날짜 -->
  <div class="card">
    <div class="card-title">출석 날짜 (출석확인증용)</div>

    <!-- 횟수 빠른선택 -->
    <div style="margin-bottom:10px;">
      <div class="sc-label" style="font-size:11.5px;font-weight:600;color:#444;margin-bottom:8px;">총 수강 횟수</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px;">
        <button class="preset-btn" onclick="setSessionsPreset(8)">8회</button>
        <button class="preset-btn" onclick="setSessionsPreset(16)">16회</button>
        <button class="preset-btn" onclick="setSessionsPreset(24)">24회</button>
        <button class="preset-btn" onclick="setSessionsPreset(32)">32회</button>
        <button class="preset-btn" onclick="setSessionsPreset(48)">48회</button>
        <div style="display:flex;align-items:center;gap:6px;margin-left:4px;">
          <button class="sc-btn" onclick="changeSessions(-1)">−</button>
          <span class="sc-count" id="sc-num">8</span>
          <span class="sc-unit">회</span>
          <button class="sc-btn" onclick="changeSessions(1)">+</button>
        </div>
      </div>
    </div>

    <!-- 요일 반복 채우기 -->
    <div style="background:#fafafa;border:1.5px solid #eee;border-radius:10px;padding:14px;margin-bottom:14px;">
      <div style="font-size:11.5px;font-weight:700;color:#444;margin-bottom:10px;">📅 요일 반복 자동 채우기</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
        <span style="font-size:11px;color:#666;align-self:center;">시작일</span>

<!-- ══════════════════════════════════════════
     인쇄 전용 타겟 (화면에서는 숨김)
══════════════════════════════════════════ -->
<div id="print-target" style="display:none;"></div>

<script>
// ─── 상태 ────────────────────────────────────────────────────
let sessions = 8;
let currentDocIdx = 0;
let docData = null;

// ─── 세션 컨트롤 ─────────────────────────────────────────────
let selectedDays = [];  // 0=월,1=화,...,6=일

function changeSessions(d) {
  sessions = Math.max(1, Math.min(48, sessions + d));
  document.getElementById('sc-num').textContent = sessions;
  updatePresetBtns();
  renderDateGrid();
}

function setSessionsPreset(n) {
  sessions = n;
  document.getElementById('sc-num').textContent = n;
  updatePresetBtns();
  renderDateGrid();
}

function updatePresetBtns() {
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.textContent) === sessions);
  });
}

function toggleDay(idx, label) {
  const btns = document.querySelectorAll('.day-btn');
  if (selectedDays.includes(idx)) {
    selectedDays = selectedDays.filter(d => d !== idx);
    btns[idx].classList.remove('active');
  } else {
    selectedDays.push(idx);
    selectedDays.sort();
    btns[idx].classList.add('active');
  }
}

function renderDateGrid() {
  const grid = document.getElementById('date-grid');
  const existing = Array.from(grid.querySelectorAll('input')).map(i => i.value);
  grid.innerHTML = '';
  for (let i = 0; i < sessions; i++) {
    const inp = document.createElement('input');
    inp.placeholder = `${i+1}회`;
    inp.value = existing[i] || '';
    grid.appendChild(inp);
  }
}

function clearDates() {
  document.querySelectorAll('#date-grid input').forEach(inp => inp.value = '');
}

// 시간 선택 드롭다운 생성 (30분 단위, 06:00~23:30)
function buildTimeOptions(selectId, defaultVal) {
  const sel = document.getElementById(selectId);
  sel.innerHTML = '';
  for (let h = 6; h <= 23; h++) {
    for (let m of [0, 30]) {
      const hh = String(h).padStart(2,'0');
      const mm = String(m).padStart(2,'0');
      const val = `${hh}:${mm}`;
      const opt = document.createElement('option');
      opt.value = val; opt.textContent = val;
      if (val === defaultVal) opt.selected = true;
      sel.appendChild(opt);
    }
  }
}

// 요일 반복 채우기 (실제 달력 기반)
function fillRepeatDates() {
  if (selectedDays.length === 0) {
    alert('요일을 선택해주세요.');
    return;
  }
  const startVal = document.getElementById('repeat-start').value;
  if (!startVal) { alert('시작일을 선택해주세요.'); return; }

  // JS Date의 getDay(): 0=일,1=월,...,6=토
  // selectedDays: 0=월,1=화,...,6=일 → 변환
  const jsDay = d => (d + 1) % 7;  // 월(0)→1, 화(1)→2, ..., 일(6)→0

  const inputs = document.querySelectorAll('#date-grid input');
  let current = new Date(startVal + 'T00:00:00');
  let filled = 0;

  inputs.forEach(inp => inp.value = '');

  // 최대 2년치 순회
  let safety = 0;
  while (filled < sessions && safety < 730) {
    const dow = current.getDay();  // 0=일~6=토
    const isSelected = selectedDays.some(d => jsDay(d) === dow);
    if (isSelected) {
      const m = current.getMonth() + 1;
      const day = current.getDate();
      inputs[filled].value = `${m}/${day}`;
      filled++;
    }
    current.setDate(current.getDate() + 1);
    safety++;
  }
}

// ── 날짜 유틸 ─────────────────────────────────────────────────
function dateToFull(y, mInt, dInt) {
  return `${y}년  ${mInt}월  ${dInt}일`;
}
function dateToDot(y, mInt, dInt) {
  return `${y}. ${mInt}. ${dInt}`;
}
function parseDateVal(val) {
  // val: YYYY-MM-DD
  const [y, m, d] = val.split('-');
  return { y, mInt: parseInt(m), dInt: parseInt(d) };
}

// date picker → 텍스트 필드 동기화
function syncDateToText(calId, textId, fmt) {
  const val = document.getElementById(calId).value;
  if (!val) return;
  const { y, mInt, dInt } = parseDateVal(val);
  document.getElementById(textId).value =
    fmt === 'full' ? dateToFull(y, mInt, dInt) : dateToDot(y, mInt, dInt);
}

// ── 수강기간 캘린더 연동 ───────────────────────────────────────
function syncPeriod() { /* 실시간 미리보기용 - 적용 버튼 누를때만 반영 */ }

function applyPeriodCal() {
  const s = document.getElementById('f-period-start').value;
  const e = document.getElementById('f-period-end').value;
  if (!s && !e) return;
  let result = '';
  if (s) {
    const { y, mInt, dInt } = parseDateVal(s);
    result += `${y}년 ${mInt}월 ${dInt}일`;
  }
  if (s && e) result += ' ~ ';
  if (e) {
    const { y, mInt, dInt } = parseDateVal(e);
    result += `${y}년 ${mInt}월 ${dInt}일`;
  }
  document.getElementById('f-period').value = result;

  // 출석날짜 섹션 시작일도 자동 동기
  if (s) {
    document.getElementById('repeat-start').value = s;
    // 출석 연도도 자동 세팅
    const { y } = parseDateVal(s);
    document.getElementById('f-year').value = y;
  }
}

// ── 교육요일·시간 UI ───────────────────────────────────────────
let schedDays = [];
let useMaemae = true;

function toggleMaemae() {
  useMaemae = !useMaemae;
  document.getElementById('btn-maemae').classList.toggle('active', useMaemae);
}

function toggleSchedDay(btn, day) {
  btn.classList.toggle('active');
  if (schedDays.includes(day)) {
    schedDays = schedDays.filter(d => d !== day);
  } else {
    schedDays.push(day);
  }
}

function applySchedule() {
  if (schedDays.length === 0) { alert('요일을 선택하세요.'); return; }
  const st = document.getElementById('sched-start-t').value;
  const en = document.getElementById('sched-end-t').value;
  const prefix = useMaemae ? '매주 ' : '';
  const dayStr = schedDays.join(', ');
  let result = `${prefix}${dayStr}요일 ${st}–${en}`;
  document.getElementById('f-schedule').value = result;

  // 출석날짜 섹션 시간·요일 드롭다운도 동기
  document.getElementById('repeat-start-time').value = st;
  document.getElementById('repeat-end-time').value   = en;
  selectedDays = [...schedDays];
  document.querySelectorAll('.day-btn').forEach((btn, i) => {
    btn.classList.toggle('active', selectedDays.includes(i));
  });
}

// 교육요일 설정 → 출석날짜 섹션 자동 동기
function applyScheduleToAttendance() {
  if (schedDays.length === 0) { alert('먼저 교육요일 섹션에서 요일을 선택해주세요.'); return; }

  // 시작일: 출석날짜 섹션 > 수강기간 시작일 순서로 자동 참조
  const startInput = document.getElementById('repeat-start').value
                  || document.getElementById('f-period-start').value;
  if (!startInput) { alert('수강기간 시작일을 먼저 입력해주세요.'); return; }

  // 출석날짜 시작일 필드도 채워줌
  document.getElementById('repeat-start').value = startInput;

  const toJsDay = d => (d + 1) % 7;

  // ① 시간 드롭다운 동기
  const schedSt = document.getElementById('sched-start-t').value;
  const schedEn = document.getElementById('sched-end-t').value;
  document.getElementById('repeat-start-time').value = schedSt;
  document.getElementById('repeat-end-time').value   = schedEn;

  // ② 요일 버튼 동기
  // schedDays = ['토','일'] 같은 문자열 배열 → 숫자 인덱스로 변환
  const dayNameToIdx = {'월':0,'화':1,'수':2,'목':3,'금':4,'토':5,'일':6};
  selectedDays = schedDays.map(d => dayNameToIdx[d]).filter(n => n !== undefined);
  document.querySelectorAll('.day-btn').forEach((btn, i) => {
    btn.classList.toggle('active', selectedDays.includes(i));
  });

  // ③ 종료일 결정: 수강기간 종료일 있으면 그 날까지, 없으면 sessions 횟수 기준
  const endInput = document.getElementById('f-period-end').value;
  const endDate  = endInput ? new Date(endInput + 'T00:00:00') : null;

  const collectedDates = [];
  let current = new Date(startInput + 'T00:00:00');
  let safety  = 0;
  const maxCount = sessions > 0 ? sessions : 999; // sessions=0이면 종료일까지 전부

  while (safety < 730) {
    // 종료일 초과 시 중단
    if (endDate && current > endDate) break;
    // sessions 지정돼 있으면 횟수 초과 시 중단
    if (sessions > 0 && collectedDates.length >= sessions) break;

    const dow = current.getDay();
    if (selectedDays.some(d => toJsDay(d) === dow)) {
      collectedDates.push(`${current.getMonth()+1}/${current.getDate()}`);
    }
    current.setDate(current.getDate() + 1);
    safety++;
  }

  if (collectedDates.length === 0) {
    alert('해당 기간에 선택한 요일이 없습니다. 수강기간과 요일을 확인해주세요.');
    return;
  }

  // ④ sessions를 수집된 날짜 수로 맞추고 그리드 재생성
  sessions = collectedDates.length;
  document.getElementById('sc-num').textContent = sessions;
  updatePresetBtns();
  renderDateGrid();

  // ⑤ 날짜 주입
  document.querySelectorAll('#date-grid input').forEach((inp, i) => {
    inp.value = collectedDates[i] || '';
  });
}

// ── 발급일 동기화 ─────────────────────────────────────────────
function highlightSyncBtn() {
  const btn = document.getElementById('sync-all-btn');
  if (btn) btn.style.borderColor = '#b91c1c';
}

function syncAllDates() {
  // 3개 필드 중 값 있는 것을 찾아서 나머지에 동일 날짜 적용
  const full = document.getElementById('f-issue').value.trim();
  const dot1 = document.getElementById('f-issue-short').value.trim();
  const dot2 = document.getElementById('f-publish-date').value.trim();

  // 우선순위: full > dot1 > dot2
  let sourceDate = null;  // { y, mInt, dInt }

  function tryParseFull(str) {
    // "2026년  4월  30일" or "2026년 4월 30일"
    const m = str.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
    if (m) return { y: m[1], mInt: parseInt(m[2]), dInt: parseInt(m[3]) };
    return null;
  }
  function tryParseDot(str) {
    // "2026. 4. 30" or "2026.4.30"
    const m = str.match(/(\d{4})[.\s]+(\d{1,2})[.\s]+(\d{1,2})/);
    if (m) return { y: m[1], mInt: parseInt(m[2]), dInt: parseInt(m[3]) };
    return null;
  }

  if (full) sourceDate = tryParseFull(full);
  if (!sourceDate && dot1) sourceDate = tryParseDot(dot1);
  if (!sourceDate && dot2) sourceDate = tryParseDot(dot2);

  if (!sourceDate) { alert('날짜가 입력된 필드가 없습니다.\n하나 이상 먼저 입력해주세요.'); return; }

  const { y, mInt, dInt } = sourceDate;
  document.getElementById('f-issue').value        = dateToFull(y, mInt, dInt);
  document.getElementById('f-issue-short').value  = dateToDot(y, mInt, dInt);
  document.getElementById('f-publish-date').value = dateToDot(y, mInt, dInt);

  // 캘린더도 동기화
  const isoDate = `${y}-${String(mInt).padStart(2,'0')}-${String(dInt).padStart(2,'0')}`;
  document.getElementById('f-issue-cal').value        = isoDate;
  document.getElementById('f-issue-short-cal').value  = isoDate;
  document.getElementById('f-publish-cal').value       = isoDate;
}

// ─── 폼 → 데이터 수집 ─────────────────────────────────────────
// 금액 포맷: 숫자 입력 → 1,234,567원 형식
function formatMoney(raw) {
  if (!raw) return '';
  // 숫자·쉼표·원 이외 제거
  let num = raw.replace(/[^0-9]/g, '');
  if (!num) return raw;  // 숫자 없으면 원본 그대로
  // 세자리 쉼표
  let formatted = parseInt(num, 10).toLocaleString('ko-KR');
  return formatted + '원';
}

function collectData() {
  const dates = Array.from(document.querySelectorAll('#date-grid input'))
    .map(i => i.value.trim()).filter(Boolean);
  return {
    name:        document.getElementById('f-name').value.trim() || '수강생',
    birth:       document.getElementById('f-birth').value.trim(),
    course:      document.getElementById('f-course').value.trim() || '영어회화',
    tuition:     formatMoney(document.getElementById('f-tuition').value.trim()),
    period:      document.getElementById('f-period').value.trim() || '',
    schedule:    document.getElementById('f-schedule').value.trim(),
    completion:  (document.getElementById('f-completion').value.trim() || '100%'),
    year:        document.getElementById('f-year').value.trim() || '2025',
    contact:     document.getElementById('f-contact').value.trim() || '0507-1423-1123',
    issue:       document.getElementById('f-issue').value.trim(),
    issueShort:  document.getElementById('f-issue-short').value.trim(),
    publishDate: document.getElementById('f-publish-date').value.trim() || '',
    sessions:    sessions,
    dates:       dates,
  };

        <td class="lbl">교&nbsp;육&nbsp;기&nbsp;간</td>
        <td class="val" colspan="3">${d.period}</td>
      </tr>
      <tr>
        <td class="lbl">교육요일 및 시간</td>
        <td class="val" colspan="3">${d.schedule}</td>
      </tr>
      <tr>
        <td class="lbl">교&nbsp;&nbsp;육&nbsp;&nbsp;비</td>
        <td class="val" colspan="3">${d.tuition}</td>
      </tr>
      <tr>
        <td class="lbl">수&nbsp;&nbsp;료&nbsp;&nbsp;율</td>
        <td class="val" colspan="3">${d.completion}</td>
      </tr>
      <tr>
        <td class="lbl">기관 담당자</td>
        <td class="val" colspan="3">최진혁&nbsp;&nbsp;${d.contact}</td>
      </tr>
    </table>
    <div class="doc-confirm">위와 같이 교육과정을 수료하였음을 확인합니다.</div>
    <div class="doc-date">${d.issue}</div>
    ${signBlock()}
  </div>
</div>`;
}

// 2. 출석확인증
function buildLectureCert(d) {
  const half = Math.ceil(d.dates.length / 2);
  const left  = d.dates.slice(0, half);
  const right = d.dates.slice(half);
  let rows = '';
  for (let i = 0; i < half; i++) {
    const li = i + 1;
    const ri = half + i + 1;
    rows += `<tr>
      <td class="att-lbl">${li}회</td>
      <td>${left[i] || ''}</td>
      <td class="att-lbl">${right[i] ? ri+'회' : ''}</td>
      <td>${right[i] || ''}</td>
    </tr>`;
  }
  return `
<div class="doc-page" id="doc-1">
  <div class="doc-border"></div>
  <div class="doc-inner">
    <div class="doc-title en">LECTURE&nbsp;&nbsp;CERTIFICATE<span class="sub">출석확인증</span></div>
    <div style="font-size:9px;margin-bottom:7px;">□&nbsp;&nbsp;성&nbsp;&nbsp;명&nbsp;&nbsp;:&nbsp;&nbsp;${d.name}</div>
    <div style="font-size:9px;margin-bottom:7px;">□&nbsp;&nbsp;수강기간&nbsp;&nbsp;:&nbsp;&nbsp;${d.period}</div>
    <div style="font-size:9px;margin-bottom:12px;">□&nbsp;&nbsp;수&nbsp;강&nbsp;료&nbsp;&nbsp;:&nbsp;&nbsp;${d.tuition}</div>
    <div style="font-size:9px;margin-bottom:7px;">□&nbsp;&nbsp;프로그램</div>
    <table class="doc-table" style="margin-bottom:12px;">
      <tr>
        <td class="lbl" style="width:22%">수강기관명</td>
        <td class="val" style="width:22%">라이언멤버스</td>
        <td class="lbl" style="width:22%">수강과목</td>
        <td class="val" style="width:34%">${d.course}</td>
      </tr>
      <tr>
        <td class="lbl">수강기준횟수</td>
        <td class="val">${d.sessions}회</td>
        <td class="lbl">출석률</td>
        <td class="val">${d.completion || '100%'}</td>
      </tr>
    </table>
    <div style="font-size:9px;margin-bottom:7px;">□&nbsp;&nbsp;출석사항 (${d.year}년 월/일)</div>
    <table class="attend-table">${rows}</table>
    <div class="doc-confirm" style="margin-top:22px;">위 사항이 사실임을 확인함</div>
    <div class="doc-date">${d.issueShort}</div>
    ${signBlock("margin-top:14px;")}
    <div style="position:absolute;bottom:22px;right:28px;font-size:7px;color:#444;">발행일 : ${d.publishDate || d.issueShort}</div>
  </div>
</div>`;
}

// 3. 교육비 명세서
function buildFeeStatement(d) {
  return `
<div class="doc-page" id="doc-2">
  <div class="doc-border"></div>
  <div class="doc-inner">
    <div class="doc-title" style="font-size:16px;letter-spacing:.15em;">교육비 세부 구성 내역 명세서</div>
    <table class="doc-table">
      <tr>

      <tr>

        <td class="lbl">교&nbsp;육&nbsp;기&nbsp;간</td>
        <td class="val" colspan="3">${d.period}</td>
      </tr>
      <tr>
        <td class="lbl">교육요일 및 시간</td>

        <td class="lbl">학습 관련 비용<br><span style="font-size:7.5px">(교육비만)</span></td>

// ─── 미리보기 적용 ─────────────────────────────────────────────
let allDocs = [];

function applyAndPreview() {
  docData = collectData();
  allDocs = [
    buildCertificate(docData),
    buildLectureCert(docData),
    buildFeeStatement(docData),
  ];

  document.getElementById('preview-card').style.display = 'block';
  showDoc(0, document.querySelectorAll('.doc-tab')[0]);
  document.getElementById('preview-card').scrollIntoView({ behavior: 'smooth' });
}

function showDoc(idx, tabEl) {
  currentDocIdx = idx;
  document.querySelectorAll('.doc-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  document.getElementById('preview-area').innerHTML = allDocs[idx];
}

// ─── 인쇄 ──────────────────────────────────────────────────────
const docTitles = ['수료증', '출석확인증', '교육비명세서'];

function printCurrent() {
  if (!docData) return;
  const pt = document.getElementById('print-target');
  pt.innerHTML = allDocs[currentDocIdx];
  pt.style.display = 'block';
  document.getElementById('screen-ui').style.display = 'none';
  window.print();
  setTimeout(() => {
    pt.style.display = 'none';
    document.getElementById('screen-ui').style.display = 'block';
  }, 1000);
}

function printAll() {
  if (!docData) return;
  const pt = document.getElementById('print-target');
  pt.innerHTML = allDocs.join('');
  pt.style.display = 'block';
  document.getElementById('screen-ui').style.display = 'none';
  window.print();
  setTimeout(() => {
    pt.style.display = 'none';
    document.getElementById('screen-ui').style.display = 'block';
  }, 1000);
}

useMaemae = true;
document.getElementById('btn-maemae').classList.add('active');
updatePresetBtns();
renderDateGrid();
